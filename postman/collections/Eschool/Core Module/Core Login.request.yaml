$kind: http-request
url: https://kc-test.emis.ge/realms/eschool-dev/protocol/openid-connect/token
method: POST
body:
  type: urlencoded
  content:
    - key: grant_type
      value: "{{grant_type}}"
      disabled: true
    - key: client_id
      value: "{{client_id(Core)}}"
      disabled: true
    - key: client_secret
      value: "{{client_secret(Core)}}"
      disabled: true
    - key: username
      value: "{{username}}"
      disabled: true
    - key: password
      value: "{{password}}"
      disabled: true
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: "let response = pm.response.json();\r

      let token = response.access_token;\r

      \r

      pm.environment.set(\"coreToken\", token);\r

      pm.environment.set('coreTokenExpiry', Date.now() + response.expires_in * 1000);"
    language: text/javascript
order: 2000
