$kind: http-request
url: "{{urlCore}}libraries/region/{{itemLibraryId}}/status"
method: PATCH
queryParams:
  - key: status
    value: INACTIVE
    disabled: true
  - key: lastUpdateDate
    value: 03/06/2026%2014:00:08
    disabled: true
body:
  type: json
  content: |
    {
        "status": "{{targetStatus}}",
        "lastUpdateDate": "{{lastUpdateDate}}"
    }
scripts:
  - type: beforeRequest
    code: |
      pm.collectionVariables.set("targetStatus", "ACTIVE");
      pm.collectionVariables.set("expectedStatus", "ACTIVE");
    language: text/javascript
  - type: afterResponse
    code: |
      let res = null;
      try {
          res = pm.response.json();
      } catch (e) {
          console.warn("პასუხის body ცარიელია ან JSON არ არის:", e.message);
      }

      pm.test("სტატუს-კოდი 200", () => pm.response.to.have.status(200));

      pm.test("პასუხის დრო < 2000ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      pm.test("სტატუსი განახლდა მოთხოვნილ მნიშვნელობამდე", () => {
          pm.expect(res, "response body").to.not.be.null;
          pm.expect(res.status).to.eql(pm.collectionVariables.get("expectedStatus"));
      });

      // ვანახლებთ lastUpdateDate-ს მომდევნო ოპერაციებისთვის
      if (res && res.lastUpdateDate) {
          pm.collectionVariables.set("lastUpdateDate", res.lastUpdateDate);
      }
    language: text/javascript
order: 4000
