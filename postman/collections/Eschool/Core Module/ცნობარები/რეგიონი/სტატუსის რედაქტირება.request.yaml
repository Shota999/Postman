$kind: http-request
url: "{{urlCore}}libraries/region/{{itemLibraryId}}/status"
method: PATCH
queryParams:
  - key: status
    value: INACTIVE
    disabled: true
  - key: lastUpdateDate
    value: 03/06/2026%2014:00:08
    disabled: true
body:
  type: json
  content: "{\r

    \    \"status\": \"{{targetStatus}}\",\r

    \    \"lastUpdateDate\": \"{{lastUpdateDate}}\"\r

    }"
scripts:
  - type: beforeRequest
    code: "pm.collectionVariables.set(\"targetStatus\", \"ACTIVE\");\r

      pm.collectionVariables.set(\"expectedStatus\", \"ACTIVE\");"
    language: text/javascript
  - type: afterResponse
    code: "pm.test(\"სტატუს-კოდი 200\", () => pm.response.to.have.status(200));\r

      pm.test(\"პასუხის დრო < 2000ms\", () => pm.expect(pm.response.responseTime).to.be.below(2000));"
    language: text/javascript
order: 4000
