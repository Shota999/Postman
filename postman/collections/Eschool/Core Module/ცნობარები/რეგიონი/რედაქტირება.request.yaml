$kind: http-request
url: "{{urlCore}}libraries/region/{{itemLibraryId}}"
method: PUT
body:
  type: json
  content: |
    {
        "name": "axli62372",
        "nameEn": "axali6252",
        "code": "XI",
        "iconRemoved": true,
        "lastUpdateDate": "{{lastUpdateDate}}"
    }
scripts:
  - type: afterResponse
    code: |
      let res = null;
      try {
          res = pm.response.json();
      } catch (e) {
          console.warn("პასუხის body ცარიელია ან JSON არ არის:", e.message);
      }

      pm.test("სტატუს-კოდი 200", () => pm.response.to.have.status(200));

      pm.test("პასუხის დრო < 2000ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      pm.test("რედაქტირდა იგივე ჩანაწერი (id ემთხვევა)", () => {
          pm.expect(res, "response body").to.not.be.null;
          pm.expect(String(res.id)).to.eql(String(pm.collectionVariables.get("itemLibraryId")));
      });

      pm.test("დასახელება განახლდა", () => {
          pm.expect(res.name).to.eql("axli62372");
      });

      // ვანახლებთ lastUpdateDate-ს მომდევნო PATCH/DELETE ოპერაციებისთვის
      if (res && (res.lastUpdateDate || res.dateAdded)) {
          pm.collectionVariables.set("lastUpdateDate", res.lastUpdateDate || res.dateAdded);
      }
    language: text/javascript
order: 3000
