$kind: http-request
name: ცხრილი
url: "{{urlCore}}libraries/region?orderBy=id:asc"
method: GET
queryParams:
  - key: page
    value: "1"
    disabled: true
  - key: size
    value: "25"
    disabled: true
  - key: orderBy
    value: id:asc
  - key: search
    value: kakheti
    disabled: true
scripts:
  - type: afterResponse
    code: "let response = pm.response.json();\r

      \r

      pm.test(\"Content-Type არის JSON\", () => {\r

      \    pm.expect(pm.response.headers.get(\"Content-Type\")).to.include(\"application/json\");\r

      });\r

      pm.test(\"Check if the totalElements is correct\", function () {\r

      \    pm.expect(response.totalElements).to.equal(19);\r

      });\r

      \r

      pm.test(\"Check if the first item's name is correct\", function () {\r

      \    pm.expect(response.content[0].name).to.equal(\"კახეთი1\");\r

      });"
    language: text/javascript
order: 2000
