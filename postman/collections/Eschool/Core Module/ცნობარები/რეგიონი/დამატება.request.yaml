$kind: http-request
url: "{{urlCore}}libraries/region"
method: POST
queryParams:
  - key: search
    value: kakheti
    disabled: true
body:
  type: json
  content: |
    {
        "name": "{{regionName}}",
        "nameEn": "{{regionNameEn}}",
        "code": "{{regionCode}}",
        "iconRemoved": true
    }
scripts:
  - type: beforeRequest
    code: |
      const n = Date.now();
      const L = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

      const code = L[Math.floor(n / 26) % 26] + L[n % 26];

      pm.collectionVariables.set("regionCode", code);
      pm.collectionVariables.set("regionName", "ავტოტესტ_რეგიონი_" + n.toString().slice(-4));
      pm.collectionVariables.set("regionNameEn", "autotest_region_" + n.toString().slice(-4));
    language: text/javascript
  - type: afterResponse
    code: |
      const bodyText = pm.response.text();
      let res = null;
      try { res = JSON.parse(bodyText); } catch (e) { /* not JSON */ }

      pm.test("სტატუს-კოდი 200/201 (შეიქმნა)", () => {
          pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });

      pm.test("პასუხის დრო < 2000ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      // create-ის პასუხი შეიძლება იყოს ობიექტი {id,...}, ან მარტო id
      // (რიცხვი/ტექსტი). ვცდილობთ ყველა ვარიანტიდან ამოვიღოთ id.
      let createdId;
      if (res && typeof res === "object") {
          createdId = res.id;
      } else if (typeof res === "number") {
          createdId = res;
      } else if (bodyText && /^\d+$/.test(bodyText.trim())) {
          createdId = bodyText.trim();
      }

      pm.test("პასუხი შეიცავს ახალ id-ს", () => {
          pm.expect(createdId, "created id").to.not.be.undefined;
      });

      // დასახელებას ვამოწმებთ მხოლოდ თუ პასუხი სრული ობიექტია
      if (res && typeof res === "object" && res.name !== undefined) {
          pm.test("შექმნილი ჩანაწერის დასახელება ემთხვევა გაგზავნილს", () => {
              pm.expect(res.name).to.eql(pm.collectionVariables.get("regionName"));
          });
      }

      // ჯაჭვისთვის ვიჭერთ ახლადშექმნილი ჩანაწერის id-სა და თარიღს
      if (createdId !== undefined) {
          pm.collectionVariables.set("itemLibraryId", createdId);
          if (res && typeof res === "object" && (res.lastUpdateDate || res.dateAdded)) {
              pm.collectionVariables.set("lastUpdateDate", res.lastUpdateDate || res.dateAdded);
          }
      }

      pm.test("itemLibraryId ჩაიჭერა ჯაჭვისთვის", () => {
          pm.expect(pm.collectionVariables.get("itemLibraryId")).to.not.be.undefined;
      });
    language: text/javascript
order: 1000
