$kind: http-request
url: "{{urlCore}}libraries/bank/{{itemLibraryId}}"
method: PUT
body:
  type: json
  content: |
    {
        "name": "სს კრედო ბანკი",
        "nameEn": "{{bankName}}",
        "swiftCode": "{{bankSwiftCode}}",
        "code": "{{bankCode}}",
        "iban": "{{bankIban}}",
        "iconRemoved": true,
        "lastUpdateDate": "{{lastUpdateDate}}"
    }
scripts:
  - type: beforeRequest
    code: |-
      const n = Date.now();
      const L = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

      // swiftCode: 4 uppercase letters + "GE" + 2 digits
      const l1 = L[Math.floor(n / (26 * 26 * 26)) % 26];
      const l2 = L[Math.floor(n / (26 * 26)) % 26];
      const l3 = L[Math.floor(n / 26) % 26];
      const l4 = L[n % 26];
      const d1 = Math.floor(n / 10) % 10;
      const d2 = n % 10;
      pm.collectionVariables.set("bankSwiftCode", l1 + l2 + l3 + l4 + "GE" + d1 + d2);

      // iban: 2 uppercase letters
      pm.collectionVariables.set("bankIban", L[Math.floor(n / 100) % 26] + L[Math.floor(n / 10) % 26]);
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test("სტატუს-კოდი 200/409", () => {
          pm.expect(pm.response.code).to.be.oneOf([200, 409]);
      });

      pm.test("პასუხის დრო < 2000ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
    language: text/javascript
order: 4000
