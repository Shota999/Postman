$kind: http-request
url: "{{urlCore}}libraries/currency/{{itemLibraryId}}"
method: PUT
body:
  type: json
  content: |
    {
        "name": "{{currencyName}}",
        "nameEn": "{{currencyNameEn}}",
        "symbol": "{{currencySymbol}}",
        "exchangeRateSyncEnabled": false,
        "iconRemoved": true,
        "lastUpdateDate": "{{lastUpdateDate}}"
    }
scripts:
  - type: beforeRequest
    code: |-
      const n = Date.now();
      const L = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

      const symbol = L[Math.floor(n / 676) % 26]
          + L[Math.floor(n / 26) % 26]
          + L[n % 26];

      pm.collectionVariables.set("currencySymbol", symbol);
      pm.collectionVariables.set("currencyName", "ავტოტესტ_ვალუტა_edit_" + n.toString().slice(-4));
      pm.collectionVariables.set("currencyNameEn", "autotest_currency_edit_" + n.toString().slice(-4));
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test("სტატუს-კოდი 200/409", () => {
          pm.expect(pm.response.code).to.be.oneOf([200, 409]);
      });

      pm.test("პასუხის დრო < 2000ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
    language: text/javascript
order: 3000
