$kind: http-request
url: "{{urlCore}}libraries/currency"
method: POST
body:
  type: json
  content: |
    {
        "name": "{{currencyName}}",
        "nameEn": "{{currencyNameEn}}",
        "symbol": "{{currencySymbol}}",
        "exchangeRateSyncEnabled": false,
        "iconRemoved": true
    }
scripts:
  - type: beforeRequest
    code: |-
      const n = Date.now();
      const L = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

      const symbol = L[Math.floor(n / 676) % 26]
          + L[Math.floor(n / 26) % 26]
          + L[n % 26];

      pm.collectionVariables.set("currencySymbol", symbol);
      pm.collectionVariables.set("currencyName", "ავტოტესტ_ვალუტა_" + n.toString().slice(-4));
      pm.collectionVariables.set("currencyNameEn", "autotest_currency_" + n.toString().slice(-4));
    language: text/javascript
  - type: afterResponse
    code: |
      const bodyText = pm.response.text();
      let res = null;
      try { res = JSON.parse(bodyText); } catch (e) { /* not JSON */ }

      pm.test("სტატუს-კოდი 200/201 (შეიქმნა)", () => {
          pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });

      pm.test("პასუხის დრო < 2000ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      let createdId;
      if (res && typeof res === "object") {
          createdId = res.id;
      } else if (typeof res === "number") {
          createdId = res;
      } else if (bodyText && /^\d+$/.test(bodyText.trim())) {
          createdId = bodyText.trim();
      }

      pm.test("პასუხი შეიცავს ახალ id-ს", () => {
          pm.expect(createdId, "created id").to.not.be.undefined;
      });

      if (res && typeof res === "object" && res.name !== undefined) {
          pm.test("შექმნილი ჩანაწერის დასახელება ემთხვევა გაგზავნილს", () => {
              pm.expect(res.name).to.eql(pm.collectionVariables.get("currencyName"));
          });
      }

      if (createdId !== undefined) {
          pm.collectionVariables.set("itemLibraryId", createdId);
          if (res && typeof res === "object" && (res.lastUpdateDate || res.dateAdded)) {
              pm.collectionVariables.set("lastUpdateDate", res.lastUpdateDate || res.dateAdded);
          }
      }

      pm.test("itemLibraryId ჩაიჭერა ჯაჭვისთვის", () => {
          pm.expect(pm.collectionVariables.get("itemLibraryId")).to.not.be.undefined;
      });
    language: text/javascript
order: 1000
