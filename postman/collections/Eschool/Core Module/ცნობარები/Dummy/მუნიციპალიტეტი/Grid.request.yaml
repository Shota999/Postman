$kind: http-request
url: https://dummy-rest-service-eschool.apps.henry.ol.ge/api/municipalities
method: GET
queryParams:
  - key: page
    value: "1"
    disabled: true
  - key: size
    value: "25"
    disabled: true
  - key: search
    value: kakheti
    disabled: true
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |
      const response = pm.response.json();

      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is JSON", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("Response has paginated shape", function () {
          pm.expect(response).to.have.property("content");
          pm.expect(response.content).to.be.an("array");
          pm.expect(response).to.have.property("totalElements");
          pm.expect(response.totalElements).to.be.a("number");
      });

      pm.test("Response time is under 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      const items = response.content || [];
      const last = items[items.length - 1];
      if (last) {
          pm.collectionVariables.set("municipalityId", last.id);
      }
    language: text/javascript
order: 1000
